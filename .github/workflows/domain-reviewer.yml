name: Domain Reviewer Bot

on:
  pull_request:
    paths:
      - 'domains/*.json'
    types:
      - opened
      - synchronize

permissions:
  pull-requests: write
  contents: write

jobs:
  review:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm init -y && npm install @actions/core @actions/github

      - name: Run Domain Validator
        uses: actions/github-script@v7
        with:
          script: |
            const script = require('./scripts/validate.js');
            await script({github, context});
